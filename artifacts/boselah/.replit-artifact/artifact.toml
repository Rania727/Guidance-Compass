kind = "web"
previewPath = "/"
title = "بوصلة - BOSELAH"
version = "1.0.0"
id = "artifacts/boselah"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24047
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/boselah run dev"

[services.env]
PORT = "24047"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/boselah", "run", "build"]
publicDir = "artifacts/boselah/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
